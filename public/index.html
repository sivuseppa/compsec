<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompSecApp</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body id="app" v-cloak>

  <header class="main">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#114b99de">
        <path
          d="M480-96q-135-34-223.5-154T168-516v-228l312-120 312 120v228q0 146-88 266T480-96Zm0-488L251-422q18 68 59 124.5t98 91.5v-178h144v178q57-35 98-91.5T709-422L480-584Zm0-203-240 92v194l240-171 240 171v-194l-240-92Z" />
      </svg>
      <h1>CompSecApp</h1>
    </div>
    <div class="logout-wrapper">
      <avatar></avatar>
      <button @click="logout" class="logoutbutton button" v-if="store.isLoggedIn">Logout</button>
    </div>
  </header>
  <!-- Navigation -->
  <navigation v-if="store.isLoggedIn"></navigation>
  <!-- Login -->
  <login v-if="!store.isLoggedIn"></login>

  <main v-if="store.isLoggedIn">
    <header>
      <h2>{{ store.currentPage.title }}</h2>
    </header>
    <notice></notice>
    <section>
      <p>{{ store.currentPage.description }}</p>
      <!-- Users -->
      <users v-if="store.currentPage.title == 'Users'"></users>

    </section>
  </main>

  <footer>
    <p>&copy; 2026</p>
  </footer>

  <script type="module">
    import { createApp, ref, reactive } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import App from './components/app.js'

    createApp(App).mount('#app')
  </script>
</body>
</html>
