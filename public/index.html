<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompSecApp</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body id="app" v-cloak>

  <header class="main">
    <h1>CompSecApp</h1>
    <div class="logout-wrapper">
      <avatar></avatar>
      <button @click="logout" class="logoutbutton button" v-if="store.isLoggedIn">Logout</button>
    </div>
  </header>
  <!-- Navigation -->
  <navigation v-if="store.isLoggedIn"></navigation>
  <!-- Login -->
  <login v-if="!store.isLoggedIn"></login>

  <main v-if="store.isLoggedIn">
    <header>
      <h2>{{ store.currentPage.title }}</h2>
    </header>
    <notice></notice>
    <section>
      <p>{{ store.currentPage.description }}</p>
      <!-- Users -->
      <users v-if="store.currentPage.title == 'Users'"></users>

    </section>
  </main>

  <footer>
    <p>&copy; 2026</p>
  </footer>

  <script type="module">
    import { createApp, ref, reactive } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import App from './components/app.js'

    createApp(App).mount('#app')
  </script>
</body>
</html>
