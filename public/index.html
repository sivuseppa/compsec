<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompSecApp</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body id="app" v-cloak>

  <header class="main">
    <h1>CompSecApp</h1>
    <button @click="logout" class="logoutbutton button" v-if="isLoggedIn">Logout</button>
  </header>

  <nav v-if="isLoggedIn">
    <div class="nav-item button" @click="setPage(1)">Dashboard</div>
    <div class="nav-item button" @click="setPage(2)">Home Assistants</div>
    <div class="nav-item button" @click="setPage(3)">Users</div>
    <div class="nav-item button" @click="setPage(4)">Settings</div>
  </nav>

  <!-- Login form -->
  <login v-if="!isLoggedIn" v-model="isLoggedIn"></login>

  <main v-if="isLoggedIn">
    <header>
      <h2>{{ page.title }}</h2>
    </header>
    <notice></notice>
    <section>
      <p>{{ page.description }}</p>

      <!-- Users -->
      <users v-if="page.title == 'Users'"></users>


    </section>
  </main>

  <footer>
    <p>&copy; 2026</p>
  </footer>

  <script type="module">
    import { createApp, ref, reactive } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import App from './components/app.js'

    createApp(App).mount('#app')
  </script>
</body>
</html>
